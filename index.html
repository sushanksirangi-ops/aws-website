<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Demo Website</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    color: white;
    text-align: center;
}

header {
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

.hero {
    margin-top: 100px;
}

.hero h1 {
    font-size: 50px;
}

.hero p {
    font-size: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    background: white;
    color: #333;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #ddd;
}

footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
}
</style>
</head>

<body>

<header>🚀 My AWS Hosted Website</header>

<div class="hero">
    <h1>Hello Cloud!</h1>
    <h2>Welcome to my AWS hosted website</h2>
    <p>This website is deployed using AWS EC2 + Apache</p>
    <button onclick="alert('You clicked me!')">Click Me</button>
</div>

<footer>
    <p>Created by Siddartha and Sushank</p>
</footer>

</body>
</html>
